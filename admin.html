<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADMIN PANEL - MAD EDITZZZ</title>

<style>
body {
  background: #0d111a;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 400px;
  background: #111620;
  padding: 25px;
  border-radius: 8px;
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  background: #0d111a;
  border: 1px solid #333;
  color: white;
}

button {
  width: 100%;
  padding: 10px;
  background: #ff3c5f;
  border: none;
  color: white;
  cursor: pointer;
}

#adminPanel {
  display: none;
}
</style>
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div id="login">
    <h2>Admin Login</h2>
    <input type="password" id="password" placeholder="Enter password">
    <button onclick="login()">LOGIN</button>
    <p id="error" style="color:red;"></p>
  </div>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <h2>Add Preset</h2>

    <input type="text" id="name" placeholder="Preset Name">
    <input type="text" id="tag" placeholder="Tag">
    <input type="text" id="img" placeholder="Image URL">
    <input type="text" id="link" placeholder="Drive Link">

    <button onclick="addPreset()">ADD PRESET</button>
  </div>

</div>

<script>
const PASSWORD = "madeditzzz2025";
const STORAGE_KEY = "mad_editzzz_presets";

function login() {
  const pass = document.getElementById("password").value;

  if (pass === PASSWORD) {
    document.getElementById("login").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
  } else {
    document.getElementById("error").innerText = "Wrong Password";
  }
}

function getPresets() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
}

function savePresets(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function addPreset() {
  const name = document.getElementById("name").value;
  const tag = document.getElementById("tag").value;
  const img = document.getElementById("img").value;
  const link = document.getElementById("link").value;

  if (!name || !img || !link) {
    alert("Fill all required fields");
    return;
  }

  let presets = getPresets();

  presets.push({
    id: Date.now(),
    name,
    tag,
    img,
    link,
    downloads: 0
  });

  savePresets(presets);

  alert("Preset Added ✅");

  document.getElementById("name").value = "";
  document.getElementById("tag").value = "";
  document.getElementById("img").value = "";
  document.getElementById("link").value = "";
}
</script>

</body>
</html>
